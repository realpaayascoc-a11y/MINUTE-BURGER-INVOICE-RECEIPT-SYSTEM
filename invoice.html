<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burger King Invoice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .invoice {
      width: 600px;
      margin: 0 auto;
      border: 1px solid #000;
      padding: 10px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }
    td, th {
      border: 1px solid #000;
      padding: 5px;
    }
    .total {
      text-align: right;
      margin-top: 80px;
    }
  </style>
</head>
<body>
  <div class="invoice">
    <h2>Burger King Invoice</h2>

    <table>
      <tr>
        <td>Invoice No:</td>
        <td></td>
      </tr>
      <tr>
        <td>Date:</td>
        <td></td>
      </tr>
      <tr>
        <td>Billed To:</td>
        <td></td>
      </tr>
    </table>

    <table>
      <tr>
        <th>Item</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
      </tr>
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </table>

    <div class="total">
      <p>Grand Total: __________</p>
    </div>
  </div>
</body>
</html>
